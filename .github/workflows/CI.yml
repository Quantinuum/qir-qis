name: CI
on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    types:
      - opened
      - synchronize

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  typos:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.42.0

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            nextest_extra_args: ""
          - os: windows-latest
            nextest_extra_args: "--test-threads=1"
          - os: macos-latest
            nextest_extra_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache LLVM 21 (Linux)
        if: runner.os == 'Linux'
        id: llvm-cache-linux
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llvm21
          key: llvm-21.1.8-${{ runner.os }}-v1
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1.8"
          directory: ${{ runner.temp }}/llvm21
          env: false
      - name: Configure LLVM (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          llvm_root="${{ runner.temp }}/llvm21"
          echo "LLVM_PATH=${llvm_root}" >>"$GITHUB_ENV"
          echo "LLVM_SYS_211_PREFIX=${llvm_root}" >>"$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${llvm_root}/lib:${LD_LIBRARY_PATH:-}" >>"$GITHUB_ENV"
          echo "CC=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "CXX=${llvm_root}/bin/clang++" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install llvm@21
          if [ "$(uname -m)" = "arm64" ]; then
            LLVM_PREFIX=/opt/homebrew/opt/llvm@21
          else
            LLVM_PREFIX=/usr/local/opt/llvm@21
          fi
          echo "${LLVM_PREFIX}/bin" >>"$GITHUB_PATH"
          echo "LLVM_SYS_211_PREFIX=${LLVM_PREFIX}" >>"$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${LLVM_PREFIX}/lib" >>"$GITHUB_ENV"
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmRoot = "C:\llvm21"
          $archive = "$env:RUNNER_TEMP\clang+llvm-21.1.8-x86_64-pc-windows-msvc.tar.xz"
          $extract = "$env:RUNNER_TEMP\llvm21-extract"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/clang%2Bllvm-21.1.8-x86_64-pc-windows-msvc.tar.xz"
          Remove-Item -Recurse -Force $llvmRoot, $extract -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $extract | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $archive
          tar -xf $archive -C $extract
          $expanded = Get-ChildItem $extract -Directory | Select-Object -First 1
          Move-Item $expanded.FullName $llvmRoot
          "PATH=$llvmRoot\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_SYS_211_PREFIX=$llvmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Test (Windows suite)
        if: runner.os == 'Windows'
        run: cargo nextest run --all-targets --all-features --test-threads=1 -E "not test(test_get_entry_attributes)"
      - name: Test (Windows isolated get_entry_attributes)
        if: runner.os == 'Windows'
        run: cargo test --all-targets --all-features test_get_entry_attributes -- --test-threads=1
      - name: Test
        if: runner.os != 'Windows'
        run: cargo nextest run --all-targets --all-features ${{ matrix.nextest_extra_args }}

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - name: Cache LLVM 21
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llvm21
          key: llvm-21.1.8-${{ runner.os }}-v1
      - name: Install LLVM
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1.8"
          directory: ${{ runner.temp }}/llvm21
          env: false
      - name: Configure LLVM
        run: |
          llvm_root="${{ runner.temp }}/llvm21"
          echo "LLVM_PATH=${llvm_root}" >>"$GITHUB_ENV"
          echo "LLVM_SYS_211_PREFIX=${llvm_root}" >>"$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${llvm_root}/lib:${LD_LIBRARY_PATH:-}" >>"$GITHUB_ENV"
          echo "CC=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "CXX=${llvm_root}/bin/clang++" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "RUSTFLAGS=-D warnings -C link-arg=-fuse-ld=lld" >>"$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy, rustfmt
      - uses: mozilla-actions/sccache-action@v0.0.7
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-rust-1.93.1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-rust-1.93.1-
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-${{ runner.os }}-llvm21
          cache-on-failure: true
          cache-workspace-crates: true
          cache-targets: true
      - name: Test
        run: cargo nextest run --locked --all-targets --all-features
      - name: Run cargo fmt (check if all code is rustfmt-ed)
        run: cargo fmt --all --check
      - name: Run cargo clippy (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - uses: cargo-bins/cargo-binstall@main
        if: github.event_name != 'pull_request'
      - name: Install cargo-msrv
        if: github.event_name != 'pull_request'
        run: cargo binstall --no-confirm --force cargo-msrv
      - name: Verify the MSRV
        if: github.event_name != 'pull_request'
        run: cargo msrv verify
