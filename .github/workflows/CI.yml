name: CI
on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "DEVELOPMENT.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "qtm-qir-reference.md"
      - ".github/*.md"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  LLVM_VERSION: "21.1.8"
  LLVM_SYS_PREFIX_ENV_VAR: "LLVM_SYS_211_PREFIX"
  LLVM_RUST_CACHE_FAMILY: "llvm21"
  LLVM_LINUX_CACHE_KEY_SUFFIX: "ci-linux-shared-v1"

jobs:
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.42.0

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            nextest_extra_args: ""
          - os: windows-latest
            nextest_extra_args: "--test-threads=1"
          - os: macos-latest
            nextest_extra_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}
          llvm-sys-prefix-env-var: ${{ env.LLVM_SYS_PREFIX_ENV_VAR }}
          linux-cache-key-suffix: ${{ env.LLVM_LINUX_CACHE_KEY_SUFFIX }}
          windows-cache-key-suffix: ci-test-v1
      - name: Configure linker flags for test
        if: runner.os == 'Linux'
        run: |
          llvm_root="${LLVM_PATH}"
          echo "CC=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "CXX=${llvm_root}/bin/clang++" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "RUSTFLAGS=-D warnings -C link-arg=-fuse-ld=lld" >>"$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-${{ runner.os }}-${{ env.LLVM_RUST_CACHE_FAMILY }}
          cache-on-failure: true
          cache-workspace-crates: true
          cache-targets: true
      - name: Test (Windows suite)
        if: runner.os == 'Windows'
        run: cargo nextest run --lib --all-features --test-threads=1 -E "not test(test_get_entry_attributes)"
      - name: Test (Windows isolated get_entry_attributes)
        if: runner.os == 'Windows'
        run: cargo test --lib --all-features test_get_entry_attributes -- --test-threads=1
      - name: Test
        if: runner.os != 'Windows'
        # All exercised tests live in the library test binary. Avoid rebuilding
        # empty bin/example harnesses, which is especially expensive with LLVM 21.
        run: cargo nextest run --lib --all-features ${{ matrix.nextest_extra_args }}
      - name: Rust API example smoke
        # Reuse the already-built test-profile artifacts instead of rebuilding
        # the crate again in Cargo's default dev profile.
        run: cargo run --example rust_api --all-features --profile test
      - name: Install Python example dependencies
        env:
          MATURIN_PROFILE: dev
        run: uv sync --group dev
      - name: Python API example smoke
        env:
          MATURIN_PROFILE: dev
        # Run through the project environment so the editable install from
        # `uv sync` can be reused instead of rebuilding via script metadata.
        run: uv run python examples/python_api.py

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}
          llvm-sys-prefix-env-var: ${{ env.LLVM_SYS_PREFIX_ENV_VAR }}
          enable-macos: "false"
          enable-windows: "false"
          linux-cache-key-suffix: ${{ env.LLVM_LINUX_CACHE_KEY_SUFFIX }}
      - name: Configure linker flags for lint
        run: |
          llvm_root="${LLVM_PATH}"
          echo "CC=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "CXX=${llvm_root}/bin/clang++" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "RUSTFLAGS=-D warnings -C link-arg=-fuse-ld=lld" >>"$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-${{ runner.os }}-${{ env.LLVM_RUST_CACHE_FAMILY }}
          cache-on-failure: true
          cache-workspace-crates: true
          cache-targets: true
      - name: Run cargo fmt (check if all code is rustfmt-ed)
        run: cargo fmt --all --check
      - name: Run cargo clippy (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - uses: cargo-bins/cargo-binstall@main
        if: github.event_name != 'pull_request'
      - name: Install cargo-msrv
        if: github.event_name != 'pull_request'
        run: cargo binstall --no-confirm --force cargo-msrv
      - name: Verify the MSRV
        if: github.event_name != 'pull_request'
        run: cargo msrv verify
