name: CI
on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    types:
      - opened
      - synchronize

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  RUSTC_WRAPPER: sccache

jobs:
  typos:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.42.0

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            nextest_extra_args: ""
          - os: windows-latest
            nextest_extra_args: "--test-threads=1"
          - os: macos-latest
            nextest_extra_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0"
          directory: ${{ runner.temp }}/llvm
          env: True
      - name: Configure LLVM (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: echo "LLVM_SYS_140_PREFIX=$LLVM_PATH" >>"$GITHUB_ENV"
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            ARCH_PREFIX=arm64-apple-darwin22.3.0
          else
            ARCH_PREFIX=x86_64-apple-darwin
          fi
          curl -LO "https://github.com/llvm/llvm-project/releases/download/llvmorg-14.0.6/clang+llvm-14.0.6-${ARCH_PREFIX}.tar.xz"
          mkdir -p /tmp/llvm
          tar xf "clang+llvm-14.0.6-${ARCH_PREFIX}.tar.xz" -C /tmp/llvm --strip-components=1
          echo "/tmp/llvm/bin" >>"$GITHUB_PATH"
          echo "LLVM_SYS_140_PREFIX=/tmp/llvm" >>"$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=/tmp/llvm/lib" >>"$GITHUB_ENV"
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -L -o LLVM-14.0.6-win64.7z https://github.com/PLC-lang/llvm-package-windows/releases/download/v14.0.6/LLVM-14.0.6-win64.7z
          7z x LLVM-14.0.6-win64.7z "-oC:\LLVM" -y
          "PATH=C:\LLVM\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_SYS_140_PREFIX=C:\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Test (Windows suite)
        if: runner.os == 'Windows'
        run: cargo nextest run --all-targets --all-features --test-threads=1 -E "not test(test_get_entry_attributes)"
      - name: Test (Windows isolated get_entry_attributes)
        if: runner.os == 'Windows'
        run: cargo test --all-targets --all-features test_get_entry_attributes -- --test-threads=1
      - name: Test
        if: runner.os != 'Windows'
        run: cargo nextest run --all-targets --all-features ${{ matrix.nextest_extra_args }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache LLVM 21
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llvm21
          key: llvm-21.1.8-${{ runner.os }}-v1
      - name: Install LLVM
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1.8"
          directory: ${{ runner.temp }}/llvm21
          env: false
      - name: Configure LLVM
        run: |
          llvm_root="${{ runner.temp }}/llvm21"
          echo "LLVM_PATH=${llvm_root}" >>"$GITHUB_ENV"
          echo "LLVM_SYS_211_PREFIX=${llvm_root}" >>"$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${llvm_root}/lib:${LD_LIBRARY_PATH:-}" >>"$GITHUB_ENV"
          echo "CC=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "CXX=${llvm_root}/bin/clang++" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=${llvm_root}/bin/clang" >>"$GITHUB_ENV"
          echo "RUSTFLAGS=-D warnings -C link-arg=-fuse-ld=lld" >>"$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy, rustfmt
      - uses: mozilla-actions/sccache-action@v0.0.7
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-rust-1.93.1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-rust-1.93.1-
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-${{ runner.os }}-llvm21
          cache-on-failure: true
          cache-workspace-crates: true
          cache-targets: true
      - name: Test
        run: cargo nextest run --locked --all-targets --all-features
      - name: Run cargo fmt (check if all code is rustfmt-ed)
        run: cargo fmt --all --check
      - name: Run cargo clippy (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - uses: cargo-bins/cargo-binstall@main
        if: github.event_name != 'pull_request'
      - name: Install cargo-msrv
        if: github.event_name != 'pull_request'
        run: cargo binstall --no-confirm --force cargo-msrv
      - name: Verify the MSRV
        if: github.event_name != 'pull_request'
        run: cargo msrv verify
