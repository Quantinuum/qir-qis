name: Wheels & Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  LLVM_VERSION: "21.1.8"
  LLVM_SYS_PREFIX_ENV_VAR: "LLVM_SYS_211_PREFIX"

jobs:
  build_wheels:
    name: ${{ matrix.os }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup LLVM (Windows)
        if: matrix.os == 'windows-latest'
        uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}
          llvm-sys-prefix-env-var: ${{ env.LLVM_SYS_PREFIX_ENV_VAR }}
          enable-linux: "false"
          enable-macos: "false"
          windows-cache-key-suffix: wheels-v1

      - name: Set up Docker Buildx
        if: startsWith(matrix.os, 'ubuntu')
        uses: docker/setup-buildx-action@v3

      - name: Build custom manylinux image (x86_64)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/manylinux/Dockerfile.manylinux-2_34-x86_64
          build-args: |
            LLVM_VERSION=${{ env.LLVM_VERSION }}
          tags: qir-qis-manylinux_2_34_x86_64
          load: true
          cache-from: type=gha,scope=manylinux-x86
          cache-to: type=gha,scope=manylinux-x86,mode=min

      - name: Build custom manylinux image (aarch64)
        if: matrix.os == 'ubuntu-24.04-arm'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/manylinux/Dockerfile.manylinux-2_34-aarch64
          build-args: |
            LLVM_VERSION=${{ env.LLVM_VERSION }}
          tags: qir-qis-manylinux_2_34_aarch64
          load: true
          cache-from: type=gha,scope=manylinux-arm64
          cache-to: type=gha,scope=manylinux-arm64,mode=min

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [build_wheels]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: wheelhouse
          merge-multiple: true
      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
          generate_release_notes: true
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
