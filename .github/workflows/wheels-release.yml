name: Wheels & Release

on:
  push:
    branches:
      - main
      - feat/hugrenv-llvm
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to rebuild wheels for and publish from
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && format('workflow_dispatch-{0}', inputs.release_tag) || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  prepare_release_context:
    name: Prepare release context
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$INPUT_RELEASE_TAG"

            if [ -z "$release_tag" ]; then
              echo "release_tag input must name an existing tag" >&2
              exit 1
            fi

            if [ "$release_tag" != "${release_tag#refs/tags/}" ]; then
              echo "release_tag must be a tag name like 'v1.2.3', not '$release_tag'" >&2
              exit 1
            fi

            git ls-remote --exit-code --tags --refs \
              "$GITHUB_SERVER_URL_VALUE/$GITHUB_REPOSITORY_VALUE.git" \
              "refs/tags/$release_tag" >/dev/null || {
              echo "Tag '$release_tag' was not found on origin; please ensure the tag exists in the remote repository." >&2
              exit 1
            }

            echo "checkout_ref=refs/tags/$release_tag" >> "$GITHUB_OUTPUT"
            echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=$GITHUB_REF_VALUE" >> "$GITHUB_OUTPUT"
            echo "release_tag=$GITHUB_REF_NAME_VALUE" >> "$GITHUB_OUTPUT"
          fi

  build_wheels:
    name: ${{ matrix.os }} wheels
    runs-on: ${{ matrix.os }}
    needs: [prepare_release_context]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare_release_context.outputs.checkout_ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install hugrenv LLVM
        uses: Quantinuum/hugrverse-env/install-hugrenv-action@v1.0.0
        with:
          packages: "llvm"

      - name: Export hugrenv path for cibuildwheel
        shell: bash
        run: echo "HUGRENV_PATH=${LLVM_SYS_211_PREFIX}" >>"$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [prepare_release_context, build_wheels]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true
      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
          generate_release_notes: true
          tag_name: ${{ needs.prepare_release_context.outputs.release_tag }}
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
